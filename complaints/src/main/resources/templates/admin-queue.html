<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-bold text-slate-800">Admin Complaint Queue</h1>
            <a href="/complaints/new" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">File New Complaint</a>
        </div>
        <div class="bg-white rounded-lg shadow-md overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Title / Category</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Reporter & City</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Assigned To</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-600 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr th:each="c : ${complaints}">
                        <td class="px-6 py-4"><div class="font-bold text-gray-900" th:text="${c.title}"></div><div class="text-sm text-gray-500" th:text="${c.category}"></div></td>
                        <td class="px-6 py-4"><div class="text-gray-900" th:text="${c.reporter}"></div><div class="text-sm text-gray-500" th:text="${c.city}"></div></td>
                        <td class="px-6 py-4"><span class="px-2 py-1 text-xs font-semibold rounded-full" th:text="${c.status.toString().replace('_', ' ')}" th:classappend="${c.status.name() == 'OPEN' ? 'bg-blue-100 text-blue-800' : c.status.name() == 'IN_PROGRESS' ? 'bg-yellow-100 text-yellow-800' : c.status.name() == 'RESOLVED' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}"></span></td>
                        <td class="px-6 py-4">
                            <div th:if="${c.assignment}" th:text="${c.assignment.staff}"></div>
                            <form th:unless="${c.assignment}" th:action="@{/complaints/assign}" method="post" class="flex items-center space-x-2"><input type="hidden" name="complaintId" th:value="${c.id}" /><select name="staffName" class="block w-full text-sm border-gray-300 rounded-md"><option th:each="staff : ${staffList}" th:value="${staff}" th:text="${staff}"></option></select><button type="submit" class="bg-indigo-600 text-white px-3 py-1 rounded-md text-sm font-semibold hover:bg-indigo-700">Assign</button></form>
                        </td>
                        <td class="px-6 py-4"><a th:href="@{/complaints/{id}(id=${c.id})}" class="text-indigo-600 hover:text-indigo-900 font-semibold">View Details</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
