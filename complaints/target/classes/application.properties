spring.application.name=complaint-system
# MySQL Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/complaint_system
spring.datasource.username=root
spring.datasource.password=pass@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
# 'update' will automatically create/update tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Optional: Show SQL statements in the log
spring.jpa.show-sql=true